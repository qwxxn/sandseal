name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  cli-test:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Check
        working-directory: cli
        run: cargo check --workspace
      - name: Test
        working-directory: cli
        run: cargo test --workspace

  cli-release:
    name: Release Build (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli-test]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sandseal-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sandseal-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: sandseal-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: sandseal-darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        run: |
          mkdir -p dist
          cp cli/target/${{ matrix.target }}/release/sandseal dist/sandseal
          cp -r cli/agents dist/agents
          cp -r cli/schema dist/schema
          cd dist && tar -czf ${{ matrix.artifact }}.tar.gz sandseal agents/ schema/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
